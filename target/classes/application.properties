# ============================================
#   InventoryPro - Application Configuration
# ============================================

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# SQL init (runs data.sql after Hibernate creates tables)
spring.sql.init.mode=always

# Server
server.port=8080

# Jackson (for LocalDateTime serialization)
spring.jackson.serialization.write-dates-as-timestamps=false
